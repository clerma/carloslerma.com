  services:
    title: Services
    items:
      - icon: fab fa-chrome
        name: Web & App Development
        text: >-
          <p>Custom websites and mobile apps tailored to your brand, audience,
          and goals—designed and built from the ground up with scalability and
          usability in mind. From idea to deployment, I help bring digital
          visions to life.</p>
        button:
        link:
      - icon: fa fa-swatchbook
        name: Brand & Creative Consulting
        text: >-
          <p>Need clarity on your brand or help making things look and feel
          right? I offer creative direction, graphic design, and marketing
          insight to help businesses and individuals sharpen their visual
          identity and message.</p>
        button:
        link:
      - icon: fa fa-image
        name: Photography & Visual Storytelling
        text: >-
          <p>Specializing in weddings, lifestyle, and branded content, I capture
          moments that matter. Whether it’s for your family, event, or brand,
          I’ll help tell your story through intentional, heartfelt imagery.</p>
        button:
        link:
      - icon: fas fa-people-arrows
        name: Creative Consulting (Technical to Operational)
        text: >-
          <p>Need a second brain on your next big idea? I consult on everything
          from marketing strategy and team workflows to systems, tools, and
          automation. With experience across design, tech, and operations, I
          help streamline the creative process and unlock solutions that
          work.</p>
        button:
        link:
  history1:
    - title: EDUCATION
      items:
        - date: ‘’
          name: Austin Community College
          text: >-
            Studied core principles of design, technology, and communication.
            The majority of my growth has come through hands-on experience—late
            nights learning new tools and the real-world demands of building and
            running businesses across design, development, photography, and
            hospitality.
    - title: ABOUT
      items:
        - date: ‘’
          name: Full Stack Developer, Graphic Designer & Photographer
          text: >-
            Versed in Photoshop, Illustrator, Indesign, Lightroom & FinalCut.
            Currently expanding into Cinema 4D and After Effects. Passionate
            about using technology and design to help others build meaningful
            brands and experiences.
  history2:
    - title: EXPERIENCE
      items:
        - date: Sep 2011 - Present
          name: Accolades IT Consulting
          subname: Chief Operating Officer &amp; Partner
          text: >-
            <p>Leading web and mobile development initiatives for a wide range
            of clients across Louisiana and beyond. Services include website
            design, web application development, custom software, and CMS
            solutions.</p>
        - date: Jan 2013 - Present
          name: Carlos &amp; Ashley Photography
          subname: Owner
          text: >-
            <p>Louisiana-based wedding, engagement, portrait, and lifestyle
            photography studio. Telling couples’ love stories through
            intentional, heartfelt imagery in Lafayette and surrounding
            areas.</p>
        - date: Mar 2014 - Present
          name: Ohh Snap! Photo Booth Rentals
          subname: Owner
          text: >-
            <p>Photo booth rental company serving Lafayette, LA and Houston, TX.
            A modern, high-energy alternative to the traditional photo booth—
            designed to elevate events of all kinds.</p>
        - date: Nov 2017 - Present
          name: Prop Box
          subname: Owner
          text: >-
            <p>Online store specializing in pre-made and custom photo booth
            props. High-quality designs and materials crafted to complement any
            event aesthetic.</p>
        - date: Jun 2018 - Present
          name: Java Square Cafe
          subname: Owner
          text: >-
            <p>A community-focused full-service coffee shop in Lafayette, LA
            serving espresso drinks, lattes, cappuccinos, blended iced coffees,
            milkshakes, lemonades, and smoothies—alongside sandwiches, soups,
            and muffins.</p>
        - date: Nov 2006 - Sep 2011
          name: Our Savior's Church
          subname: Graphics &amp; Photography
          text: >-
            <p>Served the church media team for nearly 5 years, producing
            graphics and photography for a multi-campus church in Lafayette,
            Louisiana. This role launched my creative career and shaped my
            approach to visual storytelling.</p>
        - date: 2003 - 2004
          name: Texas Coffee Traders
          subname: Accounts Payable / Sales Accounting Specialist
          text: >-
            <p>Managed accounts payable and sales accounting operations for a
            specialty coffee trading company in Austin, Texas. An early role
            that blended operational precision with a growing love for
            coffee.</p>
